# .github/workflows/build-windows.yml
# AI-Coder Windows Build — PyInstaller .exe + NSIS Installer
# Trigger: Push auf master mit Tag v*, oder manuell

name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (z.B. 0.3.3)'
        required: false
        default: ''

permissions:
  contents: write  # für Release-Upload

env:
  PYTHON_VERSION: '3.12'
  APP_NAME: aicoder

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Version ermitteln ─────────────────────────────────
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER=$(python -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"([^\"]+)\"', f.read())
              print(m.group(1) if m else '0.0.0')
          ")
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "::notice::Building version $VER"

      # ── Python Setup ──────────────────────────────────────
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # ── Dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -e .

      # ── PyInstaller Build ─────────────────────────────────
      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name aicoder `
            --console `
            --noconfirm `
            --clean `
            --hidden-import=httpx `
            --hidden-import=rich `
            --hidden-import=typer `
            --hidden-import=click `
            --hidden-import=aicoder.cli `
            --hidden-import=aicoder.client `
            --hidden-import=aicoder.config `
            --hidden-import=aicoder.agent `
            --hidden-import=aicoder.docs_context `
            --hidden-import=aicoder.history `
            --hidden-import=aicoder.session_state `
            --hidden-import=aicoder.setup `
            --hidden-import=aicoder.status `
            --hidden-import=aicoder.swarm_runner `
            --hidden-import=aicoder.task `
            --hidden-import=aicoder.ui `
            --hidden-import=aicoder.workspace `
            --collect-submodules=aicoder `
            aicoder_main.py

      # ── Verify Binary ─────────────────────────────────────
      - name: Verify aicoder.exe
        shell: pwsh
        run: |
          $exe = "dist\aicoder.exe"
          if (!(Test-Path $exe)) {
            Write-Error "aicoder.exe not found!"
            exit 1
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "aicoder.exe size: $([math]::Round($size, 1)) MB"

          # Test run — capture stdout+stderr for diagnostics
          $proc = Start-Process -FilePath $exe -ArgumentList "status" `
            -NoNewWindow -Wait -PassThru `
            -RedirectStandardOutput "stdout.txt" `
            -RedirectStandardError "stderr.txt"

          Write-Host "--- STDOUT ---"
          Get-Content stdout.txt -ErrorAction SilentlyContinue
          Write-Host "--- STDERR ---"
          Get-Content stderr.txt -ErrorAction SilentlyContinue
          Write-Host "--- EXIT CODE: $($proc.ExitCode) ---"

          if ($proc.ExitCode -ne 0) {
            Write-Host "::error::aicoder.exe --help failed with exit code $($proc.ExitCode)"
            # Don't fail the build — upload artifact for debugging
            Write-Host "::warning::Verify failed but continuing to upload artifact"
          }

      # ── NSIS Installer ────────────────────────────────────
      - name: Install NSIS
        continue-on-error: true
        id: nsis_install
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Verify installation
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (!(Test-Path $nsisPath)) {
            Write-Error "makensis.exe not found at expected path"
            Get-ChildItem "C:\Program Files (x86)\NSIS\" -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "NSIS found: $nsisPath"

      - name: Build NSIS Installer
        continue-on-error: true
        id: nsis_build
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"

          # Version in NSIS-Format (nur Major.Minor.Patch.0)
          $ver = $env:APP_VERSION -replace '[^0-9.]', ''
          $parts = $ver.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $nsisVer = ($parts[0..3] -join '.')

          Write-Host "Building installer with NSIS..."
          & $makensis /V4 /DVERSION="$env:APP_VERSION" `
                      /DVERSIONINFO="$nsisVer" `
                      /DEXE_PATH="dist\aicoder.exe" `
                      packaging\windows\installer.nsi
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::NSIS build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "Installer built successfully"
          Get-ChildItem aicoder-*-setup.exe

      # ── Artifacts hochladen ───────────────────────────────
      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: aicoder-${{ steps.version.outputs.version }}-windows-exe
          path: dist/aicoder.exe
          retention-days: 30

      - name: Upload installer artifact
        if: steps.nsis_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: aicoder-${{ steps.version.outputs.version }}-windows-setup
          path: aicoder-*-setup.exe
          retention-days: 30

      # ── Release (nur bei Tag) ─────────────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aicoder.exe
            aicoder-*-setup.exe
          generate_release_notes: true

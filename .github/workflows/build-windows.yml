name: Build Windows (.exe + Installer)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 PyQt6-Qt6 PyQt6-sip
          pip install -e .

      - name: Build aicoder.exe (onefile)
        run: pyinstaller aicoder-windows.spec

      - name: Verify binary starts
        shell: cmd
        run: dist\aicoder.exe --help || exit 0

      # ── NSIS + EnVar Plugin ─────────────────────────────────────
      - name: Install NSIS + EnVar plugin
        shell: powershell
        run: |
          choco install nsis --no-progress -y
          $zip = "$env:TEMP\envar.zip"
          Invoke-WebRequest -Uri "https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip" `
            -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\envar" -Force
          $nsis = "C:\Program Files (x86)\NSIS"
          Copy-Item "$env:TEMP\envar\Plugins\x86-unicode\EnVar.dll" `
            "$nsis\Plugins\x86-unicode\EnVar.dll" -Force
          Copy-Item "$env:TEMP\envar\Plugins\x86-ansi\EnVar.dll" `
            "$nsis\Plugins\x86-ansi\EnVar.dll" -Force

      - name: Stage exe for installer
        shell: cmd
        run: copy dist\aicoder.exe installer\aicoder.exe

      - name: Build NSIS installer
        shell: cmd
        run: '"C:\Program Files (x86)\NSIS\makensis.exe" installer\aicoder.nsi'

      # ── Version aus pyproject.toml ──────────────────────────────
      - name: Read version
        id: version
        shell: python
        run: |
          import tomllib, os
          with open("pyproject.toml", "rb") as f:
              v = tomllib.load(f)["project"]["version"]
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"ver={v}\n")

      # ── Upload Artifacts ────────────────────────────────────────
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: aicoder-${{ steps.version.outputs.ver }}-windows.exe
          path: dist\aicoder.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aicoder-${{ steps.version.outputs.ver }}-setup.exe
          path: installer\aicoder-setup.exe

      # ── GitHub Release (nur bei Tag-Push) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "aicoder ${{ steps.version.outputs.ver }}"
          files: |
            dist/aicoder.exe
            installer/aicoder-setup.exe
          generate_release_notes: true

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-coder"
version = "0.4.0"
description = "Terminalbasierter Coding-Agent für AILinux / TriForce Backend"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "httpx>=0.27.0",
  "rich>=13.7.0",
  "typer>=0.12.0"
]

[project.optional-dependencies]
gui = ["PyQt6>=6.6.0"]

[project.scripts]
aicoder = "aicoder.cli:main"

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["aicoder*"]
